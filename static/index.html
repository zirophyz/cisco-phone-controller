<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cisco Phone Controller</title>
<style>
:root {
    --blue: #0078d4;
    --blue-dark: #005a9e;
    --bg: #f0f2f5;
    --card: #fff;
    --border: #dde1e6;
    --text: #1a1a1a;
    --text-secondary: #666;
    --success: #080;
    --error: #c00;
    --radius: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

/* ── Menu bar ── */
.menu-bar {
    background: var(--blue);
    color: #fff;
    display: flex;
    align-items: center;
    padding: 0 16px;
    height: 40px;
    flex-shrink: 0;
    gap: 2px;
}
.menu-bar .app-title {
    font-weight: 700;
    font-size: 0.95rem;
    margin-right: auto;
}
.menu-bar .version {
    font-size: 0.75rem;
    opacity: 0.8;
    margin-left: 6px;
    font-weight: 400;
}
.menu-bar button {
    background: none;
    border: none;
    color: #fff;
    cursor: pointer;
    padding: 5px 10px;
    border-radius: 3px;
    font-size: 0.8rem;
}
.menu-bar button:hover { background: rgba(255,255,255,0.15); }

/* ── Status bar ── */
.status-strip {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 6px 20px;
    font-size: 0.85rem;
    color: var(--text-secondary);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 8px;
    min-height: 32px;
}
.status-strip .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--success);
    flex-shrink: 0;
}
.status-strip.error .dot { background: var(--error); }
.status-strip.error { color: var(--error); }
.status-strip.success { color: var(--success); }

/* ── Content area ── */
.content {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
}

/* ── Setup view ── */
#setup-view {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
}
.setup-box {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 32px;
    max-width: 400px;
    width: 100%;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
}
.setup-box h2 {
    font-size: 1.3rem;
    margin-bottom: 24px;
}
.setup-box label {
    display: block;
    margin: 14px 0 6px;
    font-size: 0.85rem;
    color: var(--text-secondary);
    font-weight: 600;
}
.setup-box input {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 4px;
    font-size: 1rem;
    outline: none;
    transition: border-color 0.15s;
}
.setup-box input:focus { border-color: var(--blue); }
.setup-box button {
    margin-top: 22px;
    width: 100%;
    padding: 12px;
    font-size: 1rem;
    font-weight: 700;
    color: #fff;
    background: var(--blue);
    border: none;
    border-radius: 4px;
    cursor: pointer;
    transition: background 0.15s;
}
.setup-box button:hover { background: var(--blue-dark); }
.setup-box button:disabled { background: #999; cursor: not-allowed; }
.setup-box .error {
    color: var(--error);
    margin-top: 12px;
    font-size: 0.88rem;
    display: none;
}

/* ── Controller view ── */
#controller-view { display: none; }

.controller-grid {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 20px;
    max-width: 1100px;
    margin: 0 auto;
}

/* Left column: phone screen + keypad */
.phone-col {
    display: flex;
    flex-direction: column;
    gap: 16px;
}

.card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
}
.card-title {
    font-size: 0.8rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--text-secondary);
    margin-bottom: 12px;
}

/* Screen */
#screen-wrap {
    border: 1px solid #333;
    background: #000;
    display: inline-block;
    position: relative;
    border-radius: 2px;
    overflow: hidden;
}
#screen-wrap img {
    width: 533px;
    height: 320px;
    display: block;
}
#screen-wrap map area { cursor: pointer; }

/* Keypad */
.keypad {
    display: grid;
    grid-template-columns: repeat(3, 64px);
    gap: 6px;
    justify-content: center;
}
.keypad-btn {
    width: 64px;
    height: 56px;
    background: #f7f8fa;
    border: 1px solid var(--border);
    text-align: center;
    line-height: 56px;
    font-weight: 700;
    color: var(--text);
    cursor: pointer;
    user-select: none;
    border-radius: 4px;
    font-size: 1.1rem;
    transition: all 0.1s;
}
.keypad-btn:hover { background: #66CDAA; border-color: #4db89a; }
.keypad-btn:active { transform: scale(0.95); }

/* ── Navigation (D-pad cross + side buttons) ── */
.nav-layout {
    display: flex;
    gap: 8px;
    align-items: stretch;
}
.dpad-cross {
    display: grid;
    grid-template-areas:
        ".     up    ."
        "left  .     right"
        ".     down  .";
    grid-template-columns: repeat(3, 56px);
    grid-template-rows: repeat(3, 56px);
    gap: 4px;
    flex-shrink: 0;
}
.dpad-cross .dpad-up    { grid-area: up; }
.dpad-cross .dpad-down  { grid-area: down; }
.dpad-cross .dpad-left  { grid-area: left; }
.dpad-cross .dpad-right { grid-area: right; }
.dpad-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    background: #f7f8fa;
    border: 1px solid var(--border);
    border-radius: 6px;
    cursor: pointer;
    user-select: none;
    font-size: 1.2rem;
    color: var(--text);
    transition: all 0.1s;
}
.dpad-btn:hover { background: #66CDAA; border-color: #4db89a; }
.dpad-btn:active { transform: scale(0.95); }
.nav-side-btns {
    display: flex;
    flex-direction: column;
    gap: 4px;
    flex: 1;
    min-width: 72px;
}
.nav-side-btn {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #f7f8fa;
    border: 1px solid var(--border);
    border-radius: 6px;
    cursor: pointer;
    user-select: none;
    font-weight: 700;
    font-size: 0.82rem;
    color: var(--text);
    transition: all 0.1s;
}
.nav-side-btn:hover { background: #66CDAA; border-color: #4db89a; }
.nav-side-btn:active { transform: scale(0.97); }
.ctrl-col {
    display: flex;
    flex-direction: column;
    gap: 16px;
    min-width: 0;
}

/* Command Centre grid */
.cmd-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
}
.cmd-btn {
    height: 34px;
    background: #f7f8fa;
    border: 1px solid var(--border);
    text-align: center;
    line-height: 34px;
    font-weight: 700;
    font-size: 0.82rem;
    color: var(--text);
    cursor: pointer;
    user-select: none;
    border-radius: 4px;
    transition: all 0.1s;
}
.cmd-btn:hover { background: #66CDAA; border-color: #4db89a; }
.cmd-btn:active { transform: scale(0.97); }
.cmd-btn.danger { color: var(--error); }
.cmd-btn.danger:hover { background: #fdd; border-color: #eaa; }

/* Actions */
.action-group {
    display: flex;
    flex-direction: column;
    gap: 10px;
}
.action-row {
    display: flex;
    align-items: center;
    gap: 8px;
}
.action-row label {
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--text-secondary);
    min-width: 90px;
    flex-shrink: 0;
}
.action-row input {
    flex: 1;
    height: 34px;
    padding: 0 10px;
    border: 1px solid var(--border);
    border-radius: 4px;
    font-size: 0.9rem;
    font-weight: 600;
    color: var(--text);
    min-width: 0;
    outline: none;
}
.action-row input:focus { border-color: var(--blue); }
.action-row button {
    height: 34px;
    padding: 0 16px;
    font-weight: 700;
    font-size: 0.85rem;
    cursor: pointer;
    border: none;
    border-radius: 4px;
    color: #fff;
    background: var(--blue);
    flex-shrink: 0;
    transition: background 0.15s;
}
.action-row button:hover { background: var(--blue-dark); }

/* Log viewer modal */
.log-modal {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.5);
    z-index: 1000;
}
.log-modal.open { display: flex; align-items: center; justify-content: center; }
.log-panel {
    background: #1e1e1e;
    color: #d4d4d4;
    width: 90%;
    max-width: 1000px;
    height: 70vh;
    border-radius: 8px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
}
.log-panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    background: #2d2d2d;
    border-bottom: 1px solid #444;
}
.log-panel-header h3 {
    margin: 0;
    color: #ccc;
    font-size: 0.95rem;
}
.log-panel-header button {
    background: #444;
    border: 1px solid #555;
    color: #ccc;
    padding: 4px 12px;
    border-radius: 3px;
    cursor: pointer;
    font-size: 0.8rem;
    margin-left: 6px;
}
.log-panel-header button:hover { background: #555; }
.log-panel-header .close-btn {
    background: #c00;
    border-color: #c00;
    color: #fff;
    font-weight: 700;
    margin-left: 12px;
}
.log-panel-header .close-btn:hover { background: #a00; }
.log-content {
    flex: 1;
    overflow-y: auto;
    padding: 8px 16px;
    font-family: 'Cascadia Code', 'Consolas', 'Courier New', monospace;
    font-size: 0.78rem;
    line-height: 1.5;
    white-space: pre-wrap;
    word-break: break-all;
}
.log-line { margin: 0; }
.log-line.DEBUG { color: #888; }
.log-line.INFO { color: #4ec9b0; }
.log-line.WARNING { color: #dcdcaa; }
.log-line.ERROR { color: #f44747; }
</style>
</head>
<body>

<!-- Menu bar -->
<div class="menu-bar">
    <span class="app-title">Cisco Phone Controller <span class="version" id="app-version"></span></span>
    <button onclick="window.open('https://github.com/rn-bord/cisco-phone-controller','_blank')">GitHub</button>
    <button onclick="openLogs()">View Logs</button>
</div>

<!-- Status strip -->
<div class="status-strip" id="status-strip">
    <span class="dot"></span>
    <span id="status-text">Ready</span>
</div>

<div class="content">

<!-- SETUP VIEW -->
<div id="setup-view">
    <div class="setup-box">
        <h2>Cisco Phone Controller</h2>
        <label for="ip">Phone IP Address</label>
        <input type="text" id="ip" placeholder="e.g., 192.168.1.100" value="">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="CUCM Application User" value="">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Password" value="">
        <button id="btn-connect" onclick="doConnect()">Connect</button>
        <div class="error" id="setup-error"></div>
    </div>
</div>

<!-- CONTROLLER VIEW -->
<div id="controller-view">
    <div class="controller-grid">

        <!-- Left: Phone + Keypad -->
        <div class="phone-col">
            <div class="card">
                <div class="card-title">Phone Screen</div>
                <div id="screen-wrap">
                    <img id="screen-img" src="" alt="Phone Screen" usemap="#screen-map">
                    <map name="screen-map" id="screen-map">
                        <area shape="rect" coords="0,285,133,320"   title="Soft1"    onclick="sendKey('Soft1')">
                        <area shape="rect" coords="134,285,267,320" title="Soft2"   onclick="sendKey('Soft2')">
                        <area shape="rect" coords="268,285,401,320" title="Soft3"   onclick="sendKey('Soft3')">
                        <area shape="rect" coords="402,285,533,320" title="Soft4"   onclick="sendKey('Soft4')">
                        <area shape="rect" coords="0,45,266,90"     title="Line1"   onclick="sendKey('Line1')">
                        <area shape="rect" coords="0,91,266,136"    title="Line2"   onclick="sendKey('Line2')">
                        <area shape="rect" coords="0,137,266,182"   title="Line3"   onclick="sendKey('Line3')">
                        <area shape="rect" coords="0,183,266,228"   title="Line4"   onclick="sendKey('Line4')">
                        <area shape="rect" coords="0,229,266,274"   title="Line5"   onclick="sendKey('Line5')">
                        <area shape="rect" coords="267,45,533,90"   title="Session1" onclick="sendKey('Session1')">
                        <area shape="rect" coords="267,91,533,136"  title="Session2" onclick="sendKey('Session2')">
                        <area shape="rect" coords="267,137,533,182" title="Session3" onclick="sendKey('Session3')">
                        <area shape="rect" coords="267,183,533,228" title="Session4" onclick="sendKey('Session4')">
                        <area shape="rect" coords="267,229,533,274" title="Session5" onclick="sendKey('Session5')">
                    </map>
                </div>
            </div>
            <div class="card">
                <div class="card-title">Keypad</div>
                <div class="keypad" id="keypad"></div>
            </div>
        </div>

        <!-- Right: Commands + Actions -->
        <div class="ctrl-col">
            <div class="card">
                <div class="card-title">Navigation</div>
                <div class="nav-layout">
                    <div class="dpad-cross">
                        <div class="dpad-btn dpad-up" onclick="sendKey('NavUp')">⇧</div>
                        <div class="dpad-btn dpad-left" onclick="sendKey('NavLeft')">⇦</div>
                        <div class="dpad-btn dpad-right" onclick="sendKey('NavRight')">⇨</div>
                        <div class="dpad-btn dpad-down" onclick="sendKey('NavDwn')">⇩</div>
                    </div>
                    <div class="nav-side-btns">
                        <div class="nav-side-btn" onclick="sendKey('NavSelect')">Select</div>
                        <div class="nav-side-btn" onclick="sendKey('NavBack')">Back</div>
                        <div class="nav-side-btn" onclick="sendKey('VolUp')">Vol ▲</div>
                        <div class="nav-side-btn" onclick="sendKey('VolDwn')">Vol ▼</div>
                    </div>
                </div>
            </div>
            <div class="card">
                <div class="card-title">Function Keys</div>
                <div class="cmd-grid" id="func-grid"></div>
            </div>
            <div class="card">
                <div class="card-title">Actions</div>
                <div class="action-group">
                    <div class="action-row">
                        <label>Make Call</label>
                        <input type="text" id="inp-number" placeholder="Dial pattern">
                        <button onclick="doMakeCall()">Dial</button>
                    </div>
                    <div class="action-row">
                        <label>Macro</label>
                        <input type="text" id="inp-macro" placeholder="Settings, Pause, KeyPad5">
                        <button onclick="doMacro()">Run</button>
                    </div>
                    <div class="action-row">
                        <label>Multicast</label>
                        <input type="text" id="inp-mcast" placeholder="239.1.1.13:20480">
                        <button onclick="doJoinAudio()">Join</button>
                        <button onclick="doStopAudio()">Stop</button>
                    </div>
                    <div class="action-row">
                        <label>Display Text</label>
                        <input type="text" id="inp-display" placeholder="Message to show on phone">
                        <button onclick="doDisplay()">Send</button>
                    </div>
                </div>
            </div>
            <div class="card" style="text-align: right;">
                <button onclick="doDisconnect()" style="padding:8px 20px; border:1px solid var(--border); background:var(--card); border-radius:4px; cursor:pointer; font-weight:600; color:var(--error);">Disconnect</button>
            </div>
        </div>

    </div>
</div>

</div><!-- end .content -->

<!-- Log viewer modal -->
<div class="log-modal" id="log-modal">
    <div class="log-panel">
        <div class="log-panel-header">
            <h3>Application Logs</h3>
            <div>
                <button onclick="refreshLogs()">Refresh</button>
                <button onclick="clearLogs()">Clear</button>
                <button class="close-btn" onclick="closeLogs()">Close</button>
            </div>
        </div>
        <div class="log-content" id="log-content"></div>
    </div>
</div>

<script>
// --- State ---
let screenshotTimer = null;

// --- Version ---
fetch('/api/version').then(r => r.json()).then(d => {
    document.getElementById('app-version').textContent = 'v' + d.version;
}).catch(() => {});

// --- Status ---
function setStatus(msg, isError) {
    const strip = document.getElementById('status-strip');
    const text = document.getElementById('status-text');
    text.textContent = msg;
    strip.className = 'status-strip' + (isError ? ' error' : (msg.startsWith('Sent') ? ' success' : ''));
}

// --- Setup ---
function showError(msg) {
    const el = document.getElementById('setup-error');
    el.textContent = msg;
    el.style.display = msg ? 'block' : 'none';
}

async function doConnect() {
    const btn = document.getElementById('btn-connect');
    const ip = document.getElementById('ip').value.trim();
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;

    if (!ip || !username || !password) {
        showError('Please fill in all fields.');
        return;
    }
    showError('');
    btn.disabled = true;
    btn.textContent = 'Connecting...';

    try {
        const fd = new URLSearchParams();
        fd.append('ip', ip);
        fd.append('username', username);
        fd.append('password', password);

        const r = await fetch('/api/connect', { method: 'POST', body: fd });
        const data = await r.json().catch(() => ({}));
        if (!r.ok) throw new Error(data.detail || `HTTP ${r.status}`);

        document.getElementById('setup-view').style.display = 'none';
        document.getElementById('controller-view').style.display = 'block';
        setStatus('Connected to ' + ip);
        startScreenshotLoop();
    } catch (e) {
        showError(e.message || 'Connection failed.');
        setStatus('Connection failed', true);
    } finally {
        btn.disabled = false;
        btn.textContent = 'Connect';
    }
}

async function doDisconnect() {
    try { await fetch('/api/disconnect', {method: 'POST'}); } catch(e) {}
    stopScreenshotLoop();
    document.getElementById('controller-view').style.display = 'none';
    document.getElementById('setup-view').style.display = 'flex';
    document.getElementById('ip').value = '';
    document.getElementById('username').value = '';
    document.getElementById('password').value = '';
    showError('');
    setStatus('Ready');
}

// --- Screenshot ---
function refreshScreenshot() {
    document.getElementById('screen-img').src = '/api/screenshot?id=' + Date.now();
}
function startScreenshotLoop() {
    refreshScreenshot();
    screenshotTimer = setInterval(refreshScreenshot, 6000);
}
function stopScreenshotLoop() {
    if (screenshotTimer) { clearInterval(screenshotTimer); screenshotTimer = null; }
}

// --- Keypad generation ---
const keypadIds = ['KeyPad1','KeyPad2','KeyPad3','KeyPad4','KeyPad5','KeyPad6','KeyPad7','KeyPad8','KeyPad9','KeyPadStar','KeyPad0','KeyPadPound'];
const keypadLabels = ['1','2','3','4','5','6','7','8','9','*','0','#'];
const keypadContainer = document.getElementById('keypad');
keypadIds.forEach((id, i) => {
    const div = document.createElement('div');
    div.className = 'keypad-btn';
    div.textContent = keypadLabels[i];
    div.onclick = () => sendKey(id);
    keypadContainer.appendChild(div);
});

// --- Function keys grid ---
const funcButtons = [
    { label: 'Messages',     key: 'Messages' },
    { label: 'Directories',  key: 'Directories' },
    { label: 'Applications', key: 'Applications' },
    { label: 'Settings',     key: 'Settings' },
    { label: 'Speaker',      key: 'Speaker' },
    { label: 'Headset',      key: 'Headset' },
    { label: 'Mute',         key: 'Mute' },
    { label: 'Buzz',         key: 'Buzz',    danger: true },
    { label: 'Unlock',       key: 'Unlock',  danger: true },
];
const funcGrid = document.getElementById('func-grid');
funcButtons.forEach(b => {
    const div = document.createElement('div');
    div.className = 'cmd-btn' + (b.danger ? ' danger' : '');
    div.textContent = b.label;
    div.onclick = () => handleCmd(b.key, b.label);
    funcGrid.appendChild(div);
});

// --- XML Templates ---
const XML_KEY = '<CiscoIPPhoneExecute><ExecuteItem URL="Key:%KEY%" /></CiscoIPPhoneExecute>';
const XML_BUZZ = '<CiscoIPPhoneExecute><ExecuteItem URL="Play:CallBack.raw" /></CiscoIPPhoneExecute>';
const XML_CALL = '<CiscoIPPhoneExecute><ExecuteItem URL="Dial:%NUMBER%" /></CiscoIPPhoneExecute>';
const XML_MCAST = '<CiscoIPPhoneExecute><ExecuteItem URL="RTPMRx:%ADDRESS%:100" /></CiscoIPPhoneExecute>';
const XML_MCAST_STOP = '<CiscoIPPhoneExecute><ExecuteItem URL="RTPMRx:Stop" /></CiscoIPPhoneExecute>';
const XML_DISPLAY = '<CiscoIPPhoneText><Title>Informational Message</Title><Prompt></Prompt><Text>%MSG%</Text></CiscoIPPhoneText>';

// --- Command dispatch ---
function handleCmd(id, label) {
    if (id === 'Buzz') return sendXml(XML_BUZZ, 'Buzz');
    if (id === 'Unlock') return setStatus('Unlock not implemented', true);
    return sendKey(id);
}

async function sendKey(key) {
    const xml = XML_KEY.replace('%KEY%', key);
    await sendXml(xml, key);
}

async function sendXml(xml, desc) {
    try {
        setStatus('Sending: ' + desc + '...');
        const fd = new URLSearchParams();
        fd.append('xml', xml);
        const r = await fetch('/api/execute', { method: 'POST', body: fd });
        const data = await r.json().catch(() => ({}));
        if (!r.ok) throw new Error(data.detail || `HTTP ${r.status}`);
        setStatus('Sent: ' + desc + ' (HTTP ' + data.status + ')');
        // Refresh screenshot sooner
        clearInterval(screenshotTimer);
        screenshotTimer = setInterval(refreshScreenshot, 6000);
        setTimeout(refreshScreenshot, 750);
    } catch (e) {
        setStatus('Error: ' + (e.message || 'Failed'), true);
    }
}

// --- Advanced actions ---
async function doMakeCall() {
    const num = document.getElementById('inp-number').value.trim();
    if (!num) return setStatus('Enter a number first.', true);
    await sendXml(XML_CALL.replace('%NUMBER%', num.replace(/\+/g, '%2B')), 'Dial ' + num);
}

async function doMacro() {
    const list = document.getElementById('inp-macro').value.trim();
    if (!list) return setStatus('Enter a macro first.', true);
    const keys = list.split(',').map(s => s.trim()).filter(Boolean);
    setStatus('Running macro (' + keys.length + ' steps)...');
    for (const key of keys) {
        if (key.toLowerCase() === 'pause') {
            await new Promise(r => setTimeout(r, 500));
        } else {
            await sendKey(key);
            await new Promise(r => setTimeout(r, 500));
        }
    }
    setStatus('Macro complete.');
}

async function doJoinAudio() {
    const addr = document.getElementById('inp-mcast').value.trim();
    if (!addr) return setStatus('Enter a multicast address first.', true);
    await sendXml(XML_MCAST.replace('%ADDRESS%', addr), 'Join Audio ' + addr);
}

async function doStopAudio() {
    await sendXml(XML_MCAST_STOP, 'Stop Audio');
}

async function doDisplay() {
    const msg = document.getElementById('inp-display').value.trim();
    if (!msg) return setStatus('Enter text first.', true);
    await sendXml(XML_DISPLAY.replace('%MSG%', msg), 'Display: ' + msg);
}

// --- Log viewer ---
async function openLogs() {
    document.getElementById('log-modal').classList.add('open');
    await refreshLogs();
}
function closeLogs() {
    document.getElementById('log-modal').classList.remove('open');
}
async function refreshLogs() {
    try {
        const r = await fetch('/api/logs?count=500');
        const data = await r.json();
        const container = document.getElementById('log-content');
        const wasAtBottom = container.scrollHeight - container.scrollTop <= container.clientHeight + 30;
        container.innerHTML = data.logs.map(line => {
            const levelMatch = line.match(/\|\s*(DEBUG|INFO|WARNING|ERROR)\s*\|/);
            const level = levelMatch ? levelMatch[1] : '';
            return `<div class="log-line ${level}">${escapeHtml(line)}</div>`;
        }).join('');
        if (wasAtBottom) container.scrollTop = container.scrollHeight;
    } catch(e) {
        document.getElementById('log-content').textContent = 'Failed to load logs: ' + e.message;
    }
}
async function clearLogs() {
    try {
        await fetch('/api/logs', {method: 'DELETE'});
        document.getElementById('log-content').innerHTML = '';
    } catch(e) {}
}
function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

// Enter key on setup inputs triggers connect
['ip','username','password'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', e => {
        if (e.key === 'Enter') doConnect();
    });
});

// Escape key closes log modal
document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeLogs();
});
</script>
